kind = "web"
previewPath = "/"
title = "EchoAid — Color Palette & Design Guide"
version = "1.0.0"
id = "artifacts/echoaid-palette"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21266

[services.development]
run = "pnpm --filter @workspace/echoaid-palette run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/echoaid-palette", "run", "build" ]
publicDir = "artifacts/echoaid-palette/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21266"
BASE_PATH = "/"
